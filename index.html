<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Config</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
        body { background-color: #0a0a0a; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; padding: 20px; }
        .phone-container { width: 100%; max-width: 380px; height: 80vh; background: #111111; border: 1px solid #222222; border-radius: 30px; position: relative; box-shadow: 0 15px 35px rgba(0,0,0,0.9); padding: 30px; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .screen { display: none; width: 100%; height: 100%; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .active { display: flex; }
        h2 { font-size: 1.5rem; color: #ffffff; font-weight: 300; margin-bottom: 25px; letter-spacing: 3px; text-transform: uppercase; }
        p { font-size: 1rem; line-height: 1.6; color: #888888; margin-bottom: 35px; }
        .btn { background: #ffffff; color: #000000; border: none; padding: 14px 35px; font-size: 0.95rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; border-radius: 50px; }
        .clues-box { background: #161616; border-radius: 12px; padding: 15px; margin-bottom: 25px; font-size: 0.9rem; color: #bbbbbb; text-align: left; border-left: 3px solid #ff3366; width: 100%; }
        .clue-line { margin-bottom: 8px; font-style: italic; }
        .code-container { display: flex; gap: 12px; margin-bottom: 25px; }
        .code-box { width: 55px; height: 55px; background: #1a1a1a; border: 1px solid #333333; color: #ffffff; text-align: center; font-size: 1.6rem; font-weight: bold; border-radius: 10px; }
        .code-box:focus { border-color: #ff3366; outline: none; }
        #error-msg { color: #ff3366; font-size: 0.85rem; height: 20px; }
        .heart-pulse { font-size: 4rem; color: #ff3366; margin-bottom: 25px; animation: pulse 1.2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .final-text { color: #ffffff; font-size: 2.2rem; font-weight: bold; margin-bottom: 20px; letter-spacing: 1px; }
        .sub-final-text { color: #ff3366; font-size: 1.1rem; letter-spacing: 2px; text-transform: uppercase; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

<div class="phone-container">

    <div id="screen1" class="screen active">
        <h2>Sincronia</h2>
        <p>Abbiamo giocato con le parole, con i numeri, con la musica. C'è un'ultima frequenza da sbloccare.</p>
        <button class="btn" onclick="nextScreen(1, 2)">Inizia</button>
    </div>

    <div id="screen2" class="screen">
        <h2>Decifra il Codice</h2>
        <div class="clues-box">
            <div class="clue-line">🎵 Indizio 1: [Verso Canzone 1]</div>
            <div class="clue-line">🎵 Indizio 2: [Verso Canzone 2]</div>
            <div class="clue-line">🔢 Indizio 3: Le nostre ferie...</div>
        </div>

        <div class="code-container">
            <input type="text" maxlength="1" class="code-box" id="c1" oninput="moveNext(this, 'c2')">
            <input type="text" maxlength="1" class="code-box" id="c2" oninput="moveNext(this, 'c3')">
            <input type="text" maxlength="1" class="code-box" id="c3" oninput="moveNext(this, 'c4')">
            <input type="text" maxlength="1" class="code-box" id="c4" oninput="checkCode()">
        </div>
        <p id="error-msg"></p>
    </div>

    <div id="screen3" class="screen">
        <div class="heart-pulse">❤️</div>
        <div class="final-text" id="secret-title"></div>
        <div class="sub-final-text" id="secret-sub"></div>
    </div>

</div>

<script>
    function nextScreen(current, next) {
        document.getElementById('screen' + current).classList.remove('active');
        document.getElementById('screen' + next).classList.add('active');
    }

    function moveNext(current, nextId) {
        if (current.value.length >= 1) { document.getElementById(nextId).focus(); }
    }

    function checkCode() {
        // Il codice di sblocco (Es: 3006)
        const correctCode = "3006"; 
        
        let userCode = document.getElementById('c1').value + document.getElementById('c2').value + document.getElementById('c3').value + document.getElementById('c4').value;
        userCode = userCode.toUpperCase();
        
        if (userCode === correctCode.toUpperCase()) {
            // DECIFRAZIONE DEI MESSAGGI SEGRETI SOLO IN CASO DI SUCCESSO
            // Chi guarda su GitHub vedrà solo queste stringhe matte qui sotto
            document.getElementById('secret-title').innerText = atob("SSBsb3ZlIHlvdS4="); // Decodifica in "I love you."
            document.getElementById('secret-sub').innerText = atob("Tm93IGxvb2sgaW50byBteSBleWVzLi4u"); // Decodifica in "Now look into my eyes..."
            
            document.getElementById('error-msg').style.color = "#00ff88";
            document.getElementById('error-msg').innerText = "Sincronizzato.";
            setTimeout(() => { nextScreen(2, 3); }, 800);
        } else {
            document.getElementById('error-msg').innerText = "Sincronizzazione fallita.";
            setTimeout(() => {
                document.getElementById('c1').value = ''; document.getElementById('c2').value = ''; document.getElementById('c3').value = ''; document.getElementById('c4').value = '';
                document.getElementById('c1').focus(); document.getElementById('error-msg').innerText = "";
            }, 1200);
        }
    }
</script>
</body>
</html>
